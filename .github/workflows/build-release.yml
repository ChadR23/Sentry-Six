name: Build Release

on:
  release:
    types: [published]
  workflow_dispatch:

permissions:
  contents: write

jobs:
  populate-release-notes:
    # Auto-fill the GitHub Release body from changelog.json so published releases
    # match the formatting used by the DevTool (✦ feature, ↑ improvement, ✓ fix).
    # Only runs on a real release event, and only overwrites when the body is empty
    # so manually-authored notes are never clobbered.
    runs-on: ubuntu-latest
    if: github.event_name == 'release'
    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Fill release notes from changelog.json
        env:
          GH_TOKEN: ${{ github.token }}
          TAG: ${{ github.event.release.tag_name }}
        run: |
          # Strip leading v and any -rc* / -beta* suffix so pre-release tags still
          # match their base changelog entry (v2026.17.26-rc1 → 2026.17.26).
          VERSION="${TAG#v}"
          BASE_VERSION="${VERSION%%-*}"

          CURRENT_BODY=$(gh release view "$TAG" --json body --jq .body)
          if [ -n "$CURRENT_BODY" ]; then
            echo "Release already has notes — skipping auto-fill."
            exit 0
          fi

          # Find the last stable release (not a prerelease, not the current tag).
          # Any changelog.json entries between it and the current version are
          # "unreleased" drafts we roll forward into this release's notes.
          LAST_RELEASED=$(gh release list --limit 50 --json tagName,isPrerelease \
            --jq "[.[] | select(.tagName != \"$TAG\" and .isPrerelease == false) | .tagName] | first // \"\"")
          LAST_VERSION="${LAST_RELEASED#v}"
          LAST_VERSION="${LAST_VERSION%%-*}"
          echo "Last stable release: ${LAST_RELEASED:-(none)}  →  version for comparison: ${LAST_VERSION:-(none)}"

          BODY=$(jq -r \
            --arg cur_v "$BASE_VERSION" \
            --arg last_v "$LAST_VERSION" \
            '
            def icon:
              if . == "feature" then "✦"
              elif . == "improvement" then "↑"
              elif . == "fix" then "✓"
              else "•" end;
            def as_ver: split(".") | map(tonumber);

            ($cur_v | as_ver) as $curV
            | (if $last_v == "" then [0,0,0] else ($last_v | as_ver) end) as $lastV
            | . as $root
            | (
                # Current version: its own changes, no header
                [
                  $root.versions[]
                  | select(.version == $cur_v)
                  | .changes[]
                  | "\(.type | icon) \(.description)"
                ] | join("\n")
              ) as $cur_block
            | [
                # Intermediate never-released versions, each with a header
                $root.versions[]
                | select(
                    (.version | as_ver) < $curV
                    and (.version | as_ver) > $lastV
                  )
                | "\n### From v\(.version)\(if ((.title // "") != "") then " — " + .title else "" end)\n" +
                  ([.changes[] | "\(.type | icon) \(.description)"] | join("\n"))
              ] as $inter_blocks
            | ([$cur_block] + $inter_blocks) | join("\n")
            ' changelog.json)

          if [ -z "$BODY" ]; then
            echo "No changelog entries to publish for $BASE_VERSION — leaving release notes empty."
            exit 0
          fi

          printf '%s\n' "$BODY" | gh release edit "$TAG" --notes-file -
          echo "Release notes populated for $TAG (current: $BASE_VERSION, since last stable: ${LAST_VERSION:-none})."

  build-windows:
    runs-on: windows-latest
    timeout-minutes: 30

    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: 22
          cache: 'npm'

      - name: Install dependencies
        run: npm ci

      - name: Build Windows installer
        run: npm run build:win
        env:
          CSC_IDENTITY_AUTO_DISCOVERY: false

      - name: Upload Windows artifacts
        uses: actions/upload-artifact@v4
        with:
          name: windows-build
          retention-days: 30
          path: |
            release/SentryStudioSetup*.exe
            release/SentryStudioSetup*.exe.blockmap
            release/latest.yml

      - name: Attach to GitHub Release
        if: github.event_name == 'release'
        env:
          GH_TOKEN: ${{ github.token }}
        run: |
          gh release upload "${{ github.event.release.tag_name }}" release/SentryStudioSetup*.exe release/SentryStudioSetup*.exe.blockmap release/latest.yml --clobber

  build-mac:
    runs-on: macos-latest
    timeout-minutes: 45
    env:
      HAS_MAC_CERTIFICATE: ${{ secrets.MAC_CERTIFICATE_P12 != '' }}
      HAS_APPLE_API_KEY: ${{ secrets.APPLE_API_KEY != '' }}

    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: 22
          cache: 'npm'

      - name: Install dependencies
        run: npm ci

      - name: Setup macOS code signing
        if: env.HAS_MAC_CERTIFICATE == 'true'
        env:
          MAC_CERTIFICATE_P12: ${{ secrets.MAC_CERTIFICATE_P12 }}
          MAC_CERTIFICATE_PASSWORD: ${{ secrets.MAC_CERTIFICATE_PASSWORD }}
        run: |
          # Create a temporary keychain
          KEYCHAIN_PATH=$RUNNER_TEMP/build.keychain-db
          KEYCHAIN_PASSWORD=$(openssl rand -base64 32)

          security create-keychain -p "$KEYCHAIN_PASSWORD" "$KEYCHAIN_PATH"
          security set-keychain-settings -lut 21600 "$KEYCHAIN_PATH"
          security unlock-keychain -p "$KEYCHAIN_PASSWORD" "$KEYCHAIN_PATH"

          # Decode and import the certificate
          echo "$MAC_CERTIFICATE_P12" | base64 --decode > $RUNNER_TEMP/certificate.p12
          security import $RUNNER_TEMP/certificate.p12 \
            -k "$KEYCHAIN_PATH" \
            -P "$MAC_CERTIFICATE_PASSWORD" \
            -T /usr/bin/codesign \
            -T /usr/bin/productsign

          security set-key-partition-list -S apple-tool:,apple: -k "$KEYCHAIN_PASSWORD" "$KEYCHAIN_PATH"
          security list-keychains -d user -s "$KEYCHAIN_PATH" login.keychain-db

          # Clean up the decoded certificate file
          rm -f $RUNNER_TEMP/certificate.p12

      - name: Setup notarization credentials
        if: env.HAS_APPLE_API_KEY == 'true'
        env:
          APPLE_API_KEY_B64: ${{ secrets.APPLE_API_KEY }}
          APPLE_API_KEY_ID: ${{ secrets.APPLE_API_KEY_ID }}
        run: |
          mkdir -p "$HOME/private_keys"
          echo "$APPLE_API_KEY_B64" | base64 --decode > "$HOME/private_keys/AuthKey_${APPLE_API_KEY_ID}.p8"
          echo "APPLE_API_KEY=$HOME/private_keys/AuthKey_${APPLE_API_KEY_ID}.p8" >> "$GITHUB_ENV"

      - name: Build macOS DMG
        run: npm run build:mac
        env:
          CSC_IDENTITY_AUTO_DISCOVERY: false
          APPLE_API_KEY_ID: ${{ secrets.APPLE_API_KEY_ID }}
          APPLE_API_ISSUER: ${{ secrets.APPLE_API_ISSUER }}
          APPLE_TEAM_ID: ${{ secrets.APPLE_TEAM_ID }}

      - name: Upload macOS artifacts
        uses: actions/upload-artifact@v4
        with:
          name: mac-build
          retention-days: 30
          path: |
            release/SentryStudio-*-macOS.dmg
            release/SentryStudio-*-macOS.dmg.blockmap
            release/SentryStudio-*-macOS.zip
            release/SentryStudio-*-macOS.zip.blockmap
            release/latest-mac.yml

      - name: Attach to GitHub Release
        if: github.event_name == 'release'
        env:
          GH_TOKEN: ${{ github.token }}
        run: |
          gh release upload "${{ github.event.release.tag_name }}" \
            release/SentryStudio-*-macOS.dmg \
            release/SentryStudio-*-macOS.dmg.blockmap \
            release/SentryStudio-*-macOS.zip \
            release/SentryStudio-*-macOS.zip.blockmap \
            release/latest-mac.yml --clobber
