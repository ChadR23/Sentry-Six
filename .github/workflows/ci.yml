name: CI

# Fast validation for every push and PR: proves the repo installs cleanly and
# electron-builder can produce a packaged app on all three supported platforms.
# This replaces the pre-March-30 ci.yml that also ran Jest tests; the Jest
# framework was reverted along with other problematic commits, so this is the
# build-verification half only.

on:
  push:
    branches: [main, Dev-SEI]
  pull_request:
    branches: [main, Dev-SEI]

jobs:
  build:
    runs-on: ${{ matrix.os }}
    timeout-minutes: 20

    strategy:
      fail-fast: false
      matrix:
        os: [ubuntu-latest, macos-latest, windows-latest]

    steps:
      - uses: actions/checkout@v4

      - name: Use Node.js 22
        uses: actions/setup-node@v4
        with:
          node-version: 22
          cache: 'npm'

      - name: Install dependencies
        run: npm ci

      - name: Verify build setup
        # --dir produces an unpacked app without building the installer (much faster
        # than a full build) — enough to catch packaging config breaks, missing
        # files, and native-module issues.
        run: npx electron-builder --dir --publish never
        env:
          CSC_IDENTITY_AUTO_DISCOVERY: false
